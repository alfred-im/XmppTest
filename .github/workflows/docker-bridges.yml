name: Docker bridges smoke

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-bridges.yml'
      - 'Dockerfile'
      - 'bridge-xmpp/**'
      - 'bridge-matrix/**'
      - 'scripts/start-bridges.sh'
      - 'scripts/docker-smoke.sh'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/docker-bridges.yml'
      - 'Dockerfile'
      - 'bridge-xmpp/**'
      - 'bridge-matrix/**'
      - 'scripts/start-bridges.sh'
      - 'scripts/docker-smoke.sh'
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image and verify bridge health endpoints
        run: bash scripts/docker-smoke.sh
