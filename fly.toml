# fly.toml app configuration file generated for xmpptest on 2026-06-24T17:56:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xmpptest'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  MATRIX_PORT = '8081'
  XMPP_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
